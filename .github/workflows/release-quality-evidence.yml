name: Release quality evidence

on:
  workflow_dispatch:
    inputs:
      live_call_seconds:
        description: Live Call duration in seconds
        default: "600"
        required: true
  schedule:
    - cron: "17 2 * * 1"
  pull_request:
    paths:
      - "src/browserSession*.js"
      - "apps/web/src/BrowserWorkspace.jsx"
      - "apps/web/src/CapabilityCenter.jsx"
      - "apps/android/**"
      - "src/artifactRuntime.js"
      - "tools/release/**"
      - "tools/live-call/**"
      - ".github/workflows/release-quality-evidence.yml"

permissions:
  contents: read

jobs:
  bridge-web-browser:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run build
      - name: Exercise real Bridge browser and Web UI
        run: npm run release:browser-evidence:spawn
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bridge-web-browser-${{ github.run_id }}
          path: |
            .tmp/release-evidence/browser
            .tmp/release-evidence/bridge.*.log
          if-no-files-found: error

  android-device-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: cd apps/android && ./gradlew connectedDebugAndroidTest
      - name: Capture device diagnostics
        if: always()
        run: |
          mkdir -p .tmp/release-evidence/android
          adb logcat -d > .tmp/release-evidence/android/logcat.txt || true
          adb shell screencap -p /sdcard/final.png || true
          adb pull /sdcard/final.png .tmp/release-evidence/android/final.png || true
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: android-device-regression-${{ github.run_id }}
          path: |
            apps/android/app/build/reports/androidTests
            apps/android/app/build/outputs/androidTest-results
            .tmp/release-evidence/android
          if-no-files-found: warn

  live-call-quality:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run long weak-network baseline
        shell: pwsh
        run: |
          $env:VIBELINK_EVIDENCE_SECONDS = if ("${{ github.event_name }}" -eq "schedule") { "3600" } else { "${{ inputs.live_call_seconds }}" }
          npm run release:live-call-evidence
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: live-call-quality-${{ github.run_id }}
          path: |
            .tmp/release-evidence/live-call
          if-no-files-found: error
